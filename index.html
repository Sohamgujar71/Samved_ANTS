<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SAATHI Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>SAATHI Monitoring Dashboard</h1>
<p>Smart Safety & Assistance System for Sanitation Workers</p>
</header>

<div class="container">

<div class="card">
<h2>Workers Active</h2>
<p id="workers">12</p>
</div>

<div class="card">
<h2>Gas Alerts</h2>
<p id="alerts">2</p>
</div>

<div class="card">
<h2>Emergency SOS</h2>
<p id="sos">1</p>
</div>

<div class="card">
<h2>System Status</h2>
<p class="safe">SAFE</p>
</div>

</div>

<footer>
<p>SAATHI IoT Safety System</p>
</footer>

<script src="script.js"></script>

</body>
</html>
